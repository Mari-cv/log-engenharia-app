<style>

  .card-popular { font-size: 11px; color: #546E7A; line-height: 1.4; margin-bottom: 8px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid #F0F0F0; }

  .modal-popular { color: #546E7A; font-size: 13px; margin-bottom: 16px; }

  .foto-auto-badge{position:absolute;top:4px;left:4px;background:rgba(39,174,96,0.88);color:white;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;z-index:5;}

</div>

async function buscarFotosINaturalist(nc){
  try{
    const r=await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(nc)}&rank=species&per_page=1&photos=true`,
      {signal:AbortSignal.timeout(6000)});
    if(!r.ok)return[];
    const data=await r.json();
    const taxon=data.results?.[0];
    if(!taxon)return[];
    const r2=await fetch(`https://api.inaturalist.org/v1/taxa/${taxon.id}`,{signal:AbortSignal.timeout(6000)});
    if(!r2.ok)return[];
    const data2=await r2.json();
    const taxonFotos=data2.results?.[0]?.taxon_photos||[];
    const livres=['cc-by','cc-by-nc','cc-by-sa','cc-by-nc-sa','cc0','cc-by-nc-nd','cc-by-nd'];
    const res=[];
    for(const tf of taxonFotos){
      const p=tf.photo||{};
      const lic=(p.license_code||'').toLowerCase();
      if(!livres.some(l=>lic.includes(l.replace('cc-','')))) continue;
      const url=(p.medium_url||p.url||'').replace('square','medium');
      if(!url) continue;
      res.push({url,atribuicao:p.attribution||'iNaturalist',licenca:p.license_code||''});
      if(res.length>=4) break;
    }
    if(!res.length&&taxon.default_photo){
      const p=taxon.default_photo;
      const lic=(p.license_code||'').toLowerCase();
      if(livres.some(l=>lic.includes(l.replace('cc-','')))){
        res.push({url:(p.medium_url||p.url||'').replace('square','medium'),
          atribuicao:p.attribution||'iNaturalist',licenca:p.license_code||''});
      }
    }
    return res;
  }catch(e){return[];}
}

function temDados(idx){const d=dadosExtras[idx]||{};return CAMPOS.some(c=>c.key!=='observacoes'&&d[c.key]);}

function renderCards(){const l=getEspeciesFiltradas();const t=estadoAtual.familiaFiltro||'Todas as espécies';document.getElementById('famHeaderTitle').textContent=t;document.getElementById('famHeaderCount').textContent=`${l.length} espécie${l.length!==1?'s':''}`;document.getElementById('totalCount').textContent=`${l.length} espécie${l.length!==1?'s':''}`;const g=document.getElementById('cardsGrid');if(!l.length){g.innerHTML='<p style="color:#90A4AE;padding:30px;">Nenhuma espécie encontrada.</p>';return;}g.innerHTML=l.map(e=>{const d=dadosExtras[e.idx]||{};const fo=fotosData[e.idx]||[];const af=autoFotos[e.idx]||[];const ti=CAMPOS.some(c=>c.key!=='observacoes'&&d[c.key]);const st=ti?'<span class="card-status ok">✔ Dados OK</span>':'<span class="card-status pendente">⏳ Pendente</span>';

      };
      return`<div class="card" onclick="abrirModal(${e.idx})"><div class="card-photos">${mkSlot(0,true)}${[1,2,3].map(fi=>mkSlot(fi,false)).join('')}</div><div class="card-body"><span class="card-fam-tag">${e.familia.split('-')[0]}</span><div class="card-cientifico">${e.cientifico}</div><div class="card-popular">${e.popular}</div><div class="card-footer"><span class="card-pagina">p. ${e.pagina}</span>${st}<button class="card-detail-btn" onclick="event.stopPropagation();abrirModal(${e.idx})">Detalhes</button></div></div></div>`;}).join('');}

async function uploadFoto(idx,fi,input){
  const f=input.files[0];if(!f)return;
  mostrarToast('⏳ Enviando foto…');
  try{
    const fd=new FormData();
    fd.append('file',f);fd.append('upload_preset',PRESET);
    fd.append('public_id',`arvBr2/e${idx}_f${fi}_${Date.now()}`);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,{method:'POST',body:fd});
    const d=await r.json();
    if(d.secure_url){
      if(!fotosData[idx])fotosData[idx]=[];
      fotosData[idx][fi]=d.secure_url;
      if(autoFotos[idx])autoFotos[idx][fi]=null;
      salvarFotos();renderCards();
      mostrarToast('✅ Foto adicionada!');
    }else mostrarToast('❌ '+(d.error?.message||'Erro'));
  }catch(e){mostrarToast('❌ '+e.message);}
}

        </div>
        <div class="modal-foto-fonte">© ${aimg.atribuicao} · ${aimg.licenca}</div>
      </div>`;
    }
    return `<div class="modal-photo-slot"><span class="modal-add-icon">📷</span><span class="modal-photo-label">${lb}</span>
      <label style="position:absolute;inset:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <input type="file" accept="image/*" style="display:none" onchange="uploadFotoModal(${idx},${fi},this)">
      </label></div>`;
  }).join('');
}

function zoomAuto2(i,fi){const af=autoFotos[i]||[];const a=af[fi];if(a)abrirLightbox(a.url,FOTO_LABELS[fi]+' © '+a.atribuicao);}
function deletarFotoModal(idx,fi){if(!fotosData[idx])return;fotosData[idx][fi]=null;salvarFotos();renderModalFotos(idx);renderCards();mostrarToast('🗑 Foto removida');}
function exportCSV(){const l=getEspeciesFiltradas();const hs=['Família','Nome Científico','Nome Popular','Página','Características','Ocorrência','Madeira','Utilidade','Ecologia','Fenologia','Sementes','Mudas','Observações'];const rows=l.map(e=>{const d=dadosExtras[e.idx]||{};return[e.familia,e.cientifico,e.popular,e.pagina,d.morfologia||'',d.ocorrencia||'',d.madeira||'',d.utilidade||'',d.ecologia||'',d.fenologia||'',d.sementes||'',d.mudas||'',d.observacoes||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');});const csv='\uFEFF'+[hs.join(','),...rows].join('\n');const b=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Arvores_Brasileiras_Vol2.csv';a.click();mostrarToast('⬇ CSV exportado!');}
function mostrarToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function salvarApp(){const h=document.documentElement.outerHTML;const dj=JSON.stringify(dadosExtras);const fj=JSON.stringify(fotosData);const sc=`<script id="dados-salvos">(function(){try{localStorage.setItem('arvoresBr2_dados',${JSON.stringify(dj)});localStorage.setItem('arvoresBr2_fotos',${JSON.stringify(fj)});}catch(e){}})();<\/script>`;const hf=h.replace('</body>',sc+'\n</body>');const b=new Blob([hf],{type:'text/html;charset=utf-8'});const a=document.createElement('a');const data=new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');a.href=URL.createObjectURL(b);a.download=`Arvores_Brasileiras_Vol2_${data}.html`;a.click();mostrarToast('💾 App salvo com todos os dados!');}

carregarDados();
renderSidebar();
renderCards();
</script>
